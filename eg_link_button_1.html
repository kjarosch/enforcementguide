<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EG Link Button</title>
<style>
  body { margin: 0; padding: 24px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: #ffffff; }
  .eg-link-block { display: flex; align-items: center; justify-content: space-between; background: #FDF7E7; border-radius: 8px; padding: 16px 20px; max-width: 600px; }
  .eg-link-label { font-size: 13px; color: #57606a; margin: 0 0 4px; }
  .eg-link-name { font-size: 16px; font-weight: 500; color: #24292f; margin: 0; }
  .eg-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 500; color: #24292f; background: #ffffff; border: 1px solid #d0d7de; border-radius: 6px; padding: 8px 14px; text-decoration: none; white-space: nowrap; }
  .eg-btn:hover { background: #f3f4f6; }
</style>
</head>
<body>
  <div class="eg-link-block">
    <div>
      <p class="eg-link-label">Your reference</p>
      <p class="eg-link-name">Thumbtack Enforcement Guide</p>
    </div>
    <a class="eg-btn" href="https://docs.google.com/spreadsheets/d/1iPdvAppuz40GnriB-1ydn1FnlHemAEFg47BP9snCYNI/edit" target="_blank">
      Open and bookmark ↗
    </a>
  </div>
</body>
</html>
